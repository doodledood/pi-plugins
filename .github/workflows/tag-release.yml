name: Tag release on version bump

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backfill and publish version tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Walk every commit (oldest first) that changed the root package.json
          # version and make sure a matching vX.Y.Z tag + GitHub release exists.
          # Runs on every push to main, so a version bump always gets a tag,
          # and any past release that was never tagged gets backfilled too.
          commits=$(git log --reverse --format='%H' -- package.json)
          prev_version=""
          for commit in $commits; do
            version=$(git show "$commit:package.json" | jq -r '.version // empty')
            if [ -z "$version" ] || [ "$version" = "$prev_version" ]; then
              continue
            fi
            prev_version="$version"
            tag="v$version"

            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              continue
            fi

            echo "Creating missing tag $tag at $commit"
            git tag -a "$tag" "$commit" -m "$tag"
            git push origin "refs/tags/$tag"

            if ! gh release view "$tag" >/dev/null 2>&1; then
              gh release create "$tag" --title "$tag" --generate-notes --target "$commit"
            fi
          done
